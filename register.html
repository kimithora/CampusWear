<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - CampusWear</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/layout.css">
    <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-left">
            <div class="auth-brand">
                <div class="brand-icon">CW</div>
                <span>CampusWear</span>
            </div>
            
            <div class="auth-illustration">
                <div class="illustration-content">
                    <h2>Bergabung dengan CampusWear!</h2>
                    <p>Daftar sekarang dan jadilah bagian dari komunitas thrifting mahasiswa terbesar di Indonesia.</p>
                    
                    <div class="stats-highlight">
                        <div class="stat">
                            <strong>10K+</strong>
                            <span>Mahasiswa</span>
                        </div>
                        <div class="stat">
                            <strong>500+</strong>
                            <span>Kampus</span>
                        </div>
                        <div class="stat">
                            <strong>50K+</strong>
                            <span>Produk</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="auth-right">
            <div class="auth-form-container">
                <div class="auth-header">
                    <h1>Buat Akun Baru</h1>
                    <p>Sudah punya akun? <a href="login.html">Masuk di sini</a></p>
                </div>
                
                <form class="auth-form" id="registerForm">
                    <div class="grid grid-2" style="gap: var(--space-4);">
                        <div class="form-group">
                            <label class="form-label form-label-required">Nama Depan</label>
                            <input 
                                type="text" 
                                class="form-input" 
                                id="firstName"
                                placeholder="John"
                                required
                            >
                        </div>
                        <div class="form-group">
                            <label class="form-label form-label-required">Nama Belakang</label>
                            <input 
                                type="text" 
                                class="form-input" 
                                id="lastName"
                                placeholder="Doe"
                                required
                            >
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label form-label-required">Email</label>
                        <div class="input-group">
                            <span class="input-icon">📧</span>
                            <input 
                                type="email" 
                                class="form-input" 
                                id="email"
                                placeholder="nama@email.com"
                                required
                            >
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label form-label-required">No. Telepon</label>
                        <div class="input-group">
                            <span class="input-icon">📱</span>
                            <input 
                                type="tel" 
                                class="form-input" 
                                id="phone"
                                placeholder="0812-3456-7890"
                                required
                            >
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label form-label-required">Kampus</label>
                        <select class="form-select" id="campus" required>
                            <option value="">Pilih kampus</option>
                            <option value="ui">Universitas Indonesia</option>
                            <option value="itb">Institut Teknologi Bandung</option>
                            <option value="ugm">Universitas Gadjah Mada</option>
                            <option value="unpad">Universitas Padjadjaran</option>
                            <option value="ipb">IPB University</option>
                            <option value="other">Lainnya</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label form-label-required">Password</label>
                        <div class="input-group">
                            <span class="input-icon">🔒</span>
                            <input 
                                type="password" 
                                class="form-input" 
                                id="password"
                                placeholder="Minimal 8 karakter"
                                required
                            >
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label form-label-required">Konfirmasi Password</label>
                        <div class="input-group">
                            <span class="input-icon">🔒</span>
                            <input 
                                type="password" 
                                class="form-input" 
                                id="confirmPassword"
                                placeholder="Ulangi password"
                                required
                            >
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-check">
                            <input type="checkbox" class="form-check-input" id="terms" required>
                            <span class="form-check-label">
                                Saya setuju dengan <a href="#">Syarat & Ketentuan</a> dan <a href="#">Kebijakan Privasi</a>
                            </span>
                        </label>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">
                        Daftar Sekarang
                    </button>
                    
                    <div class="auth-divider">
                        <span>atau daftar dengan</span>
                    </div>
                    
                    <div class="social-login">
                        <button type="button" class="btn btn-secondary" style="flex: 1;">
                            <span>🔍</span> Google
                        </button>
                        <button type="button" class="btn btn-secondary" style="flex: 1;">
                            <span>📘</span> Facebook
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/mock-data.js"></script>
    <script src="assets/js/auth.js"></script>
</body>
</html>
