<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keranjang - CampusWear</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/customer.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="../index.html" class="navbar-brand">
                <div class="brand-icon">CW</div>
                <span>CampusWear</span>
            </a>
            
            <div class="navbar-nav">
                <a href="./dashboard.html" class="nav-link">Dashboard</a>
                <a href="./browse.html" class="nav-link">Jelajahi</a>
                <a href="./orders.html" class="nav-link">Pesanan</a>
                <a href="./ai-coloring.html" class="nav-link">AI Style</a>
            </div>
            
            <div class="navbar-actions">
                <a href="./cart.html" class="btn btn-ghost btn-sm active" style="position: relative;">
                    🛒
                    <span class="cart-badge" id="cartBadge">0</span>
                </a>
                <div class="user-menu">
                    <button class="btn btn-ghost" id="userMenuBtn" style="display: flex; align-items: center; gap: var(--space-2);">
                        <div class="user-avatar" id="userAvatar">U</div>
                        <span id="userName">User</span>
                        <span>▼</span>
                    </button>
                    <div class="dropdown-menu" id="userDropdown">
                        <a href="./profile.html" class="dropdown-item">
                            <span>👤</span> Profil
                        </a>
                        <a href="./dashboard.html" class="dropdown-item">
                            <span>📊</span> Dashboard
                        </a>
                        <hr style="border: none; border-top: 1px solid var(--gray-200); margin: var(--space-2) 0;">
                        <button onclick="logout()" class="dropdown-item" style="color: var(--error);">
                            <span>🚪</span> Keluar
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content" style="margin-top: 5rem; padding: var(--space-8);">
        <div class="content-wrapper">
            <h1 class="page-title" style="margin-bottom: var(--space-6);">🛒 Keranjang Belanja</h1>

            <div class="cart-layout" style="display: grid; grid-template-columns: 2fr 1fr; gap: var(--space-8);">
                <!-- Cart Items -->
                <div class="cart-items" id="cartItemsContainer">
                    <div class="empty-state" id="emptyCart">
                        <div class="empty-icon">🛒</div>
                        <h3>Keranjangmu Kosong</h3>
                        <p>Yuk, jelajahi katalog dan temukan pakaian favoritmu!</p>
                        <a href="browse.html" class="btn btn-primary">Mulai Belanja</a>
                    </div>

                    <!-- Cart items will be rendered here -->
                    <div id="cartList" style="display: none;"></div>
                </div>

                <!-- Order Summary -->
                <div class="order-summary" id="orderSummary" style="display: none;">
                    <div class="card" style="position: sticky; top: 6rem;">
                        <div class="card-header">
                            <h3>Ringkasan Pesanan</h3>
                        </div>
                        <div class="card-body">
                            <div class="summary-row" style="display: flex; justify-content: space-between; margin-bottom: var(--space-3);">
                                <span>Subtotal</span>
                                <span id="subtotalPrice">Rp 0</span>
                            </div>
                            <div class="summary-row" style="display: flex; justify-content: space-between; margin-bottom: var(--space-3);">
                                <span>Ongkir</span>
                                <span id="shippingPrice">Rp 20.000</span>
                            </div>
                            <div class="summary-row" style="display: flex; justify-content: space-between; margin-bottom: var(--space-3); color: var(--success);">
                                <span>Diskon</span>
                                <span id="discountPrice">- Rp 0</span>
                            </div>
                            <hr style="border: none; border-top: 1px solid var(--gray-200); margin: var(--space-4) 0;">
                            <div class="summary-row" style="display: flex; justify-content: space-between; font-size: var(--text-xl); font-weight: 700;">
                                <span>Total</span>
                                <span id="totalPrice" style="color: var(--primary-600);">Rp 0</span>
                            </div>

                            <!-- Promo Code -->
                            <div class="promo-code" style="margin-top: var(--space-6);">
                                <label class="form-label">Kode Promo</label>
                                <div style="display: flex; gap: var(--space-2);">
                                    <input type="text" class="form-input" id="promoCode" placeholder="Masukkan kode">
                                    <button class="btn btn-secondary" onclick="applyPromo()">Apply</button>
                                </div>
                            </div>

                            <a href="checkout.html" class="btn btn-primary btn-lg" style="width: 100%; margin-top: var(--space-6);">
                                Lanjut ke Checkout
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script>
        // Handle dropdown menu for customer pages
        document.addEventListener('DOMContentLoaded', function() {
            const userMenuBtn = document.getElementById('userMenuBtn');
            const userDropdown = document.getElementById('userDropdown');
            
            if (userMenuBtn && userDropdown) {
                userMenuBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const isVisible = userDropdown.style.display === 'block';
                    userDropdown.style.display = isVisible ? 'none' : 'block';
                });
                
                // Close dropdown when clicking outside
                document.addEventListener('click', function(e) {
                    if (!userMenuBtn.contains(e.target) && !userDropdown.contains(e.target)) {
                        userDropdown.style.display = 'none';
                    }
                });
            }
        });
    </script>
    <script src="../assets/js/navigation.js"></script>
    <script src="../assets/js/cart.js"></script>
</body>
</html>
