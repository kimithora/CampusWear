<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Admin - CampusWear</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="admin-layout">
    <!-- Sidebar -->
    <aside class="admin-sidebar">
        <div class="sidebar-header">
            <a href="../index.html" class="navbar-brand">
                <div class="brand-icon">CW</div>
                <span>CampusWear</span>
            </a>
            <div class="admin-badge">ADMIN</div>
        </div>
        
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="sidebar-link">
                <span>📊</span> Dashboard
            </a>
            <a href="consigment.html" class="sidebar-link">
                <span>📦</span> Consignment
            </a>
            <a href="processing.html" class="sidebar-link">
                <span>✨</span> Processing
            </a>
            <a href="digitalization.html" class="sidebar-link">
                <span>📸</span> Digitalization
            </a>
            <a href="inventory.html" class="sidebar-link">
                <span>🏷️</span> Inventory
            </a>
            <a href="sales.html" class="sidebar-link">
                <span>💰</span> Sales
            </a>
            <a href="settlement.html" class="sidebar-link">
                <span>💸</span> Settlement
            </a>
            <a href="analytics.html" class="sidebar-link">
                <span>📈</span> Analytics
            </a>
            <a href="profile.html" class="sidebar-link active">
                <span>👤</span> Profil
            </a>
        </nav>
        
        <div class="sidebar-footer">
            <button onclick="logout()" class="sidebar-link" style="color: var(--error);">
                <span>🚪</span> Keluar
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">
        <header class="admin-header">
            <h1>👤 Profil Admin</h1>
        </header>

        <div class="admin-content">
            <div class="grid grid-3" style="gap: var(--space-6);">
                <!-- Profile Card -->
                <div class="card" style="grid-column: span 1;">
                    <div class="card-body" style="text-align: center;">
                        <div class="profile-avatar-large" id="adminProfileAvatar" style="margin: 0 auto var(--space-4); width: 120px; height: 120px; font-size: var(--text-4xl);">A</div>
                        <h2 id="adminProfileName">Admin Name</h2>
                        <p id="adminProfileEmail" style="color: var(--gray-500);">admin@campuswear.id</p>
                        <div style="margin-top: var(--space-4);">
                            <span class="badge badge-primary">Super Admin</span>
                        </div>
                    </div>
                </div>

                <!-- Edit Profile -->
                <div class="card" style="grid-column: span 2;">
                    <div class="card-header">
                        <h3>Edit Profil</h3>
                    </div>
                    <div class="card-body">
                        <form id="adminProfileForm">
                            <div class="grid grid-2" style="gap: var(--space-4);">
                                <div class="form-group">
                                    <label class="form-label">Nama Lengkap</label>
                                    <input type="text" class="form-input" id="adminEditName">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Email</label>
                                    <input type="email" class="form-input" id="adminEditEmail" disabled style="background: var(--gray-100);">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="form-label">No. Telepon</label>
                                <input type="tel" class="form-input" id="adminEditPhone">
                            </div>
                            <div style="display: flex; justify-content: flex-end; margin-top: var(--space-4);">
                                <button type="submit" class="btn btn-primary">Simpan Perubahan</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Change Password -->
            <div class="card" style="margin-top: var(--space-6);">
                <div class="card-header">
                    <h3>🔒 Ganti Password</h3>
                </div>
                <div class="card-body">
                    <form id="adminPasswordForm">
                        <div class="grid grid-3" style="gap: var(--space-4);">
                            <div class="form-group">
                                <label class="form-label">Password Saat Ini</label>
                                <input type="password" class="form-input" id="adminCurrentPassword" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Password Baru</label>
                                <input type="password" class="form-input" id="adminNewPassword" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Konfirmasi Password</label>
                                <input type="password" class="form-input" id="adminConfirmPassword" required>
                            </div>
                        </div>
                        <div style="display: flex; justify-content: flex-end; margin-top: var(--space-4);">
                            <button type="submit" class="btn btn-secondary">Ganti Password</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- System Settings -->
            <div class="card" style="margin-top: var(--space-6);">
                <div class="card-header">
                    <h3>⚙️ Pengaturan Sistem</h3>
                </div>
                <div class="card-body">
                    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-6);">
                        <div class="setting-item">
                            <label class="form-label">Platform Fee (%)</label>
                            <input type="number" class="form-input" value="10" min="0" max="50">
                        </div>
                        <div class="setting-item">
                            <label class="form-label">Minimum Settlement (Rp)</label>
                            <input type="number" class="form-input" value="50000" min="0">
                        </div>
                        <div class="setting-item">
                            <label class="form-label">Auto-Approve Threshold</label>
                            <input type="number" class="form-input" value="5" min="0">
                        </div>
                    </div>
                    <div style="display: flex; justify-content: flex-end; margin-top: var(--space-4);">
                        <button class="btn btn-primary">Simpan Pengaturan</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/admin-profile.js"></script>
</body>
</html>
